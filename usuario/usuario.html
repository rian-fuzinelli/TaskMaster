<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="usuario.css">
    <title>TaskMaster - Usuário</title>
</head>

<body>
    <aside class="sidebar">
        <div class="sidebar-logo">
            <span class="square-check" data-lucide="square-check-big"></span>
            <h1>TaskMaster</h1>
        </div>
        <div class="sidebar-menu">
            <button class="button-menu marcado" onclick="navigate('myTasks', this)">
                <span data-lucide="book-check"></span>
                <span>Minhas Tarefas</span>
            </button>
        </div>
        <div class="sidebar-footer">
            <div class="sidebar-admin" id="usuarioLogado">
                
            </div>
            <button class="log-out" onclick="logout()">
                <span data-lucide="log-out"></span>
                <span>Log out</span>
            </button>
        </div>
    </aside>
    <main id="app"></main>
    <script src="usuario.js"></script>
</body>

</html>
